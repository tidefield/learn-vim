name: LearnVim
options:
  bundleIdPrefix: com.learnvim
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.29.0"
targets:
  LearnVim:
    type: application
    platform: macOS
    sources:
      - path: LearnVim
    resources:
      - path: LearnVim/Resources
    settings:
      base:
        INFOPLIST_FILE: LearnVim/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.learnvim.app
        PRODUCT_NAME: LearnVim
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LearnVim/LearnVim.entitlements
        ENABLE_HARDENED_RUNTIME: false
    dependencies:
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
