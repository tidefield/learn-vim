name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Generate Xcode project
        run: xcodegen generate
      
      - name: Build Release
        run: xcodebuild -project LearnVim.xcodeproj -scheme LearnVim -configuration Release build
      
      - name: Package
        run: |
          cd ~/Library/Developer/Xcode/DerivedData/LearnVim-*/Build/Products/Release
          zip -r LearnVim.zip LearnVim.app
          mv LearnVim.zip $GITHUB_WORKSPACE/
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: LearnVim.zip
