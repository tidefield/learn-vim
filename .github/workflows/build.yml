name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Generate Xcode project
        run: xcodegen generate
      
      - name: Build
        run: xcodebuild -project LearnVim.xcodeproj -scheme LearnVim -configuration Release build
